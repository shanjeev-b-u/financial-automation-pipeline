name: MNC Development & Code Quality Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  development-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Initialize Enterprise Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache and Install Pinned Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Deterministic Calculations Suite
      run: |
        pytest tests/
